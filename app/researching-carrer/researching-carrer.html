<div class="career-section" id="researching-carrer">
  <h2 class="career-heading">Researching Career</h2>
  <div class="career-cards">
    <!-- Intellwheels 2.0 -->
    <app-career-card
      [media]="[
        { type: 'video', url: 'https://www.youtube.com/embed/Rka-Jh6mmho' }
      ]"
      title="Institute of Electronics and Informatics Engineering of Aveiro"
      [items]="[
        'Robotics Researcher for Intellwheels 2.0 (2019-2020): A smart wheelchair with a multi-modal interface and realistic simulator, based on ROS1. Worked on the simulator and navigation modules of the chair, reverse engineering its controller and integrating it as a ROS module. Migrated a SLAM ROS package from ROS1 to ROS2.'
      ]"
    >
    </app-career-card>

    <!-- FCPortugal 3D -->
    <app-career-card
      [media]="[
        { type: 'video', url: 'https://www.youtube.com/embed/mL4C3y9RGj0' }
      ]"
      title="Institute of Electronics and Informatics Engineering of Aveiro"
      [items]="[
        'Robotics Researcher for the FCPortugal 3D Soccer Simulation League (2016-2020): A simulated team with 11 humanoid agents that act upon their joints to play a soccer match against an enemy team, relying solely on local observations of the field state. Worked on low-level behavior optimization (like kicking and running motions), as well as high-level strategy formation (for keep-away soccer or competition matches). Was also a member of the Organizing and Maintenance Committees for the league.'
      ]"
    >
    </app-career-card>

    <!-- Lambda Architectures -->
    <app-career-card
      title="Institute of Telecommunications of Aveiro"
      [items]="[
        'Researcher for Lambda Architectures Evaluation (2015): evaluation of multiple data-processing (both batch- and stream-based) architectures focused on Big Data.'
      ]"
    >
    </app-career-card>

    <!-- CoherentPaaS -->
    <app-career-card
      title="Institute of Telecommunications of Aveiro"
      [items]="[
        'Researcher for Portugal Telecom\'s Use Case in the CoherentPaaS Platform (2015): analysis and specification of PortugalTelecom\'s requirements on the usage of CoherentPaaS, a platform where a single query language can be used to access multiple unique data stores.'
      ]"
    >
    </app-career-card>

      ]"
